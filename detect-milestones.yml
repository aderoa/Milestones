name: Detect All-Time Milestones
on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '30 6 * * *'  # 6:30 AM UTC = 1:30 AM ET (after West Coast games end)

jobs:
  milestones:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NAME_MAP_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS2iZj3avZ_-CAWKu-f_pxZkf38M0quXQwMbyTXmHsN6-c9V8vU1l_sNaxg0y8dl07dqraU3_5Z3b8D/pub?gid=1197809522&single=true&output=csv"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install nba_api requests
      - name: Run milestone detection
        run: |
          if [ ! -f snapshot.csv ]; then
            echo "No snapshot found — creating baseline"
            python milestones.py --init
          else
            python milestones.py --use-local --output milestones_today.csv
          fi
      - name: Commit snapshot + milestones
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshot.csv snapshot_new.csv milestones_today.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          DATE=$(TZ=America/New_York date +%Y-%m-%d)
          git commit -m "Milestones $DATE"
          git push
